{% extends "syncapp/base.html" %}

{% block content %}
<div class="container-fluid px-2">
  <div class="row min-vh-100">

    <!-- Sidebar -->
    <div class="col-md-3 col-lg-2 bg-light border-end p-4">
      {% include "syncapp/partials/_sidebar.html" %}
    </div>

    <!-- Main Content -->
    <div class="col-md-9 col-lg-10 p-5">

      <div class="mb-4">
        <h3 class="fw-bold">Crop History</h3>
      </div>

      <!-- Filter Buttons -->
      <div class="mb-4">
        <a href="?view=sold"
           class="btn btn-sm btn-primary {% if view_type == 'sold' %}active{% endif %}">
           Sold
        </a>
        <a href="?view=bought"
           class="btn btn-sm btn-success {% if view_type == 'bought' %}active{% endif %}">
           Bought
        </a>
        <a href="?view=all"
           class="btn btn-sm btn-outline-dark {% if view_type == 'all' %}active{% endif %}">
           All
        </a>
      </div>

      <!-- Table Card -->
      <div class="card shadow-sm w-100">
        <div class="card-body">

          <div class="table-responsive">
            {% include "syncapp/partials/_crop_table.html" %}
          </div>

        </div>
      </div>

    </div>

  </div>
</div>
{% endblock %}
