{% extends "syncapp/base.html" %}

{% block content %}

<div class="container-fluid py-4">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-3 col-lg-2 bg-white border-end min-vh-100 p-3">
            {% include "syncapp/partials/_sidebar.html" %}
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-9 col-lg-10 p-4">

            <div id="map" style="height:500px;"></div>

        </div>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    const mapContainer = document.getElementById("map");
    if (!mapContainer) return;

    var map = L.map('map').setView([20.5937, 78.9629], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var markers = [];

    {% for crop in crops %}
        {% if crop.latitude and crop.longitude %}
            var lat = parseFloat("{{ crop.latitude }}");
            var lng = parseFloat("{{ crop.longitude }}");

            if (!isNaN(lat) && !isNaN(lng)) {

                var marker = L.marker([lat, lng]).addTo(map);

                marker.bindPopup(
                    "<strong>{{ crop.commodity|escapejs }}</strong><br>" +
                    "Type: {{ crop.type|escapejs }}<br>" +
                    "Quantity: {{ crop.quantity }}"
                );

                markers.push(marker);
            }
        {% endif %}
    {% endfor %}

    if (markers.length > 0) {
        var group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
    }

});
</script>
{% endblock %}
